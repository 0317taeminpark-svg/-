<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 바닥 인식</title>
<style>
• { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

/* 전체화면 캔버스 컨테이너 */
.canvas-container { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; touch-action: none; background: #111; }
canvas { display: block; width: 100%; height: 100%; cursor: crosshair; object-fit: contain; }

/* 업로드 전 중앙 안내 */
.upload-prompt { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.upload-prompt.hidden { display: none; }
.btn-upload-big { background: #a855f7; color: #fff; border: none; padding: 16px 32px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(168,85,247,0.4); }
.upload-hint { font-size: 13px; color: rgba(255,255,255,0.5); }

/* 상단 상태바 (캔버스 위) */
.status-bar { position: fixed; top: 14px; left: 14px; right: 80px; z-index: 100; }
.info-status { background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); padding: 8px 14px; border-radius: 20px; font-size: 12px; color: rgba(255,255,255,0.85); line-height: 1.5; display: none; }
.info-status.visible { display: block; }
.info-status.ai { color: #4ade80; }
.info-status.warn { color: #fbbf24; }
.info-status.busy { color: #c084fc; }

/* 점 편집 / 다시찍기 버튼 (하단 왼쪽, 캔버스 위) */
.edit-bar { position: fixed; bottom: 16px; left: 14px; display: none; gap: 8px; z-index: 100; }
.edit-bar.visible { display: flex; }
.btn-edit { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); color: #fff; border: 1.5px solid rgba(255,255,255,0.25); padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
.btn-edit.active { background: rgba(168,85,247,0.7); border-color: #a855f7; }

/* 기존 호환용 (JS에서 참조) */
.btn-action { background: #a855f7; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
.btn-action:disabled { background: #555; cursor: not-allowed; }
.mode-btn { background: transparent; color: #fff; border: none; cursor: pointer; }
.mode-btn.active { color: #c084fc; }

/* 디버그 — 에러 발생 시만 표시 */
.debug-wrap { display: none; }
.debug-wrap.has-error { display: block; }
.debug-panel { background: #fff3f3; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; color: #dc2626; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.debug-panel.empty { color: #9ca3af; }
.debug-title { font-size: 11px; color: #9ca3af; margin-bottom: 6px; display: flex; justify-content: space-between; }
.debug-clear { color: #a855f7; cursor: pointer; }

/* ── 타일 선택기 (TileSelector.html에서 가져옴, body 규칙은 제외) ── */
.tile-picker-wrap{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;overflow:hidden;color:#222;}
.tile-picker-topbar{padding:10px 14px;border-bottom:0.5px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;}
.tile-picker-topbar-title{font-size:13px;font-weight:500;}
.tile-sel-badge{font-size:11px;color:#085041;background:#E1F5EE;border-radius:4px;padding:2px 8px;display:none;}
.tile-cat-scroll{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;border-bottom:0.5px solid #e0e0e0;}
.tile-cat-scroll::-webkit-scrollbar{display:none;}
.tile-cat-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;border:0.5px solid #ccc;background:transparent;color:#888;cursor:pointer;white-space:nowrap;}
.tile-cat-btn.active{background:#085041;color:#fff;border-color:#085041;}
.tile-slider-wrap{position:relative;}
.tile-scroll{display:flex;gap:8px;padding:12px;overflow-x:auto;scroll-behavior:smooth;}
.tile-scroll::-webkit-scrollbar{display:none;}
.tp-arrow{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:#fff;border:0.5px solid #e0e0e0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#444;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.tp-arrow-left{left:4px;}
.tp-arrow-right{right:4px;}
.tile-item{flex-shrink:0;width:80px;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;border:1.5px solid #e0e0e0;}
.tile-item.selected{border:2px solid #E24B4A;}
.tile-thumb{width:80px;height:80px;}
.tile-label{font-size:10px;color:#888;padding:4px;text-align:center;border-top:0.5px solid #e0e0e0;background:#fff;}
.tile-check{position:absolute;top:4px;right:4px;width:16px;height:16px;background:#E24B4A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:500;}
.tile-more-btn{width:calc(100% - 24px);margin:0 12px 12px;padding:8px;border:0.5px solid #ccc;border-radius:8px;background:transparent;font-size:12px;color:#888;cursor:pointer;}
.tile-indicator-row{display:flex;justify-content:center;gap:4px;padding:4px 0 8px;}
.tile-dot{width:5px;height:5px;border-radius:50%;background:#e0e0e0;transition:background 0.2s;}
.tile-dot.active{background:#085041;}
.tsize-btn { padding:5px 10px; border-radius:20px; font-size:12px; border:1.5px solid #3f3f46; background:transparent; color:#a1a1aa; cursor:pointer; white-space:nowrap; }
.tsize-btn.active { background:#a855f7; color:#fff; border-color:#a855f7; }

/* ── 우상단 플로팅 버튼 ── */
.fab-group { position:fixed; top:14px; right:14px; display:none; flex-direction:column; gap:8px; z-index:100; }
.fab-group.visible { display:flex; }
.fab-btn { width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 2px 8px rgba(0,0,0,0.5); transition:transform 0.15s; }
.fab-btn:active { transform:scale(0.92); }
.fab-save { background:#22c55e; }
.fab-tile { background:#a855f7; }
.fab-compare { background:#3b82f6; }
.fab-btn.fab-active { outline:3px solid #fff; }

/* ── 하단 슬라이드업 타일 패널 ── */
.tile-panel-overlay { display:none; }
.tile-panel-sheet { position:fixed; left:0; right:0; bottom:0; z-index:80; background:transparent; transform:translateY(100%); transition:transform 0.28s cubic-bezier(0.32,0.72,0,1); padding-bottom:12px; }
.tile-panel-sheet.open { transform:translateY(0); }
.tile-panel-handle { display:none; }

/* 타일 규격 행 — 배경 없이 떠있음 */
.tsize-row-float { display:flex; gap:6px; flex-wrap:wrap; padding:8px 14px 6px; }
.tsize-btn { padding:5px 12px; border-radius:20px; font-size:12px; border:none; background:rgba(0,0,0,0.45); color:#fff; cursor:pointer; white-space:nowrap; backdrop-filter:blur(4px); }
.tsize-btn.active { background:rgba(168,85,247,0.85); color:#fff; }

/* 카테고리 버튼 행 */
.tile-cat-scroll { display:flex; gap:6px; padding:4px 14px 6px; overflow-x:auto; border:none; background:transparent; }
.tile-cat-scroll::-webkit-scrollbar { display:none; }
.tile-cat-btn { flex-shrink:0; padding:4px 12px; border-radius:20px; font-size:12px; border:none; background:rgba(0,0,0,0.45); color:rgba(255,255,255,0.8); cursor:pointer; white-space:nowrap; backdrop-filter:blur(4px); }
.tile-cat-btn.active { background:rgba(8,80,65,0.85); color:#fff; }

/* 타일 스크롤 — 배경 없이 썸네일만 */
.tile-scroll { display:flex; gap:10px; padding:6px 14px 10px; overflow-x:auto; scroll-behavior:smooth; background:transparent; }
.tile-scroll::-webkit-scrollbar { display:none; }
.tile-item { flex-shrink:0; width:70px; border-radius:10px; overflow:hidden; cursor:pointer; position:relative; border:2px solid transparent; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.tile-item.selected { border:2px solid #E24B4A; }
.tile-thumb { width:70px; height:70px; display:block; }
.tile-label { font-size:10px; color:#fff; padding:3px 4px; text-align:center; background:rgba(0,0,0,0.5); }
.tile-check { position:absolute; top:3px; right:3px; width:14px; height:14px; background:#E24B4A; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; }

/* 화살표 버튼 숨김 (터치 스크롤로 대체) */
.tp-arrow { display:none; }
.tile-indicator-row { display:none; }
.tile-more-btn { display:none; }
.tile-picker-topbar { display:none; }
.tile-picker-wrap { background:transparent; border:none; border-radius:0; }

/* ── 원본비교 오버레이 (캔버스 위) ── */
#compareOverlay { position:absolute; inset:0; display:none; z-index:15; touch-action:none; }
#compareOverlay.open { display:block; }

/* ── 저장 팝업 ── */
.save-popup { position:fixed; right:70px; top:14px; background:#fff; border:1px solid #e5e5ea; border-radius:14px; padding:14px; width:200px; z-index:90; display:none; opacity:0; transition:opacity 0.2s, transform 0.2s; box-shadow:0 4px 20px rgba(0,0,0,0.2); transform:translateY(-4px); }
.save-popup.open { display:block; opacity:1; transform:translateY(0); }

/* ── 가구 제거 브러시 모드 ── /
.fab-remove { background:#ef4444; }
.brush-hint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:#fff; font-size:13px; padding:10px 18px; border-radius:20px; z-index:200; display:none; text-align:center; pointer-events:none; }
.brush-hint.visible { display:block; }
.remove-bar { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); display:none; gap:10px; z-index:200; }
.remove-bar.visible { display:flex; }
.btn-remove { padding:10px 20px; border-radius:20px; border:none; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-remove-do { background:#ef4444; color:#fff; }
.btn-remove-cancel { background:rgba(0,0,0,0.6); color:#fff; border:1px solid rgba(255,255,255,0.3); }
.btn-remove-undo { background:rgba(255,200,0,0.85); color:#000; }
</style>
</head>
<body>
<input type="file" id="fileInput" accept="image/" style="display:none;">
<span id="modeBadge" style="display:none;"></span>

<div class="canvas-container">
<canvas id="tileCanvas"></canvas>

<!-- 업로드 전 중앙 안내 -->
<div class="upload-prompt" id="uploadPrompt">
<button class="btn-upload-big" id="uploadBtn" disabled onclick="document.getElementById('fileInput').click()">📷 바닥 사진 업로드</button>
<div class="upload-hint" id="uploadHint">AI 라이브러리 로딩 중...</div>
</div>

<!-- 상태바 (캔버스 위 상단) -->
<div class="status-bar">
<div class="info-status" id="statusText"></div>
</div>

<!-- 하단 편집 버튼 -->
<div class="edit-bar" id="editBar">
<button class="btn-edit" id="editModeBtn">✏️ 점 편집</button>
<button class="btn-edit" onclick="resetAll()">↺ 다시 찍기</button>
</div>

<!-- 우상단 플로팅 버튼 -->
<div class="fab-group" id="fabGroup">
<button class="fab-btn fab-save" id="fabSave" title="저장">💾</button>
<button class="fab-btn fab-tile" id="fabTile" title="타일 선택">🪟</button>
<button class="fab-btn fab-compare" id="fabCompare" title="원본 비교">🔍</button>
<button class="fab-btn fab-remove" id="fabRemove" title="가구 제거">🪑</button>
</div>

<!-- 가구 제거 브러시 UI -->
<div class="brush-hint" id="brushHint">🖌️ 가구 위를 손가락으로 칠하세요<br><small>칠한 부분을 AI가 제거해요</small></div>
<div class="remove-bar" id="removeBar">
<button class="btn-remove btn-remove-undo" id="btnRemoveUndo">↺ 다시칠기</button>
<button class="btn-remove btn-remove-do" id="btnRemoveDo">✨ AI 제거</button>
<button class="btn-remove btn-remove-cancel" id="btnRemoveCancel">취소</button>
</div>

<!-- 가구 제거용 오버레이 캔버스 -->
<canvas id="brushCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:150;display:none;cursor:crosshair;touch-action:none;"></canvas>

<!-- 원본비교 오버레이 (캔버스 위) -->
<div id="compareOverlay">
<canvas id="compareTileCanvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
<canvas id="compareOrigCanvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
<div id="compareDivider" style="position:absolute;top:0;left:50%;width:3px;height:100%;background:#a855f7;cursor:ew-resize;transform:translateX(-50%);z-index:10;">
<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#a855f7;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.6);">⇔</div>
</div>
<div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;padding:3px 8px;border-radius:4px;pointer-events:none;">원본</div>
<div style="position:absolute;top:8px;right:8px;background:rgba(168,85,247,0.8);color:#fff;font-size:11px;padding:3px 8px;border-radius:4px;pointer-events:none;">타일 적용</div>
<button id="compareCloseBtn" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:20px;padding:4px 14px;font-size:12px;cursor:pointer;">닫기</button>
</div>

<!-- 저장 팝업 (캔버스 위) -->
<div class="save-popup" id="savePopup">
<div style="font-size:12px;color:#636366;margin-bottom:10px;">포맷 선택 후 바로 다운로드</div>
<div style="display:flex;gap:8px;">
<button class="save-fmt-btn" data-fmt="png" style="flex:1;background:#f3e8ff;color:#7c3aed;border:2px solid #a855f7;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;">PNG</button>
<button class="save-fmt-btn" data-fmt="jpeg" style="flex:1;background:#f2f2f7;color:#1c1c1e;border:1px solid #e5e5ea;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;">JPG</button>
<button class="save-fmt-btn" data-fmt="webp" style="flex:1;background:#f2f2f7;color:#1c1c1e;border:1px solid #e5e5ea;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;">WEBP</button>
</div>
</div>

<!-- 타일 슬라이드업 패널 (캔버스 위) -->
<div class="tile-panel-overlay" id="tilePanelOverlay"></div>
<div class="tile-panel-sheet" id="tilePanelSheet">
<div class="tile-panel-handle"></div>
<div class="tsize-row-float" id="tileSizeBtns">
<button class="tsize-btn" data-cm="30">30×30</button>
<button class="tsize-btn" data-cm="60">60×60</button>
<button class="tsize-btn active" data-cm="80">80×80</button>
<button class="tsize-btn" data-cm="100">100×100</button>
<button class="tsize-btn" data-cm="120">120×120</button>
<button class="tsize-btn" data-cm="30x60" data-w="30" data-h="60">30×60</button>
</div>
<div class="tile-picker-wrap" style="border-radius:0;border:none;background:transparent;">
<div class="tile-picker-topbar"><span class="tile-sel-badge" id="tileSelBadge"></span></div>
<div class="tile-cat-scroll" id="tileCatScroll"></div>
<div class="tile-slider-wrap">
<button class="tp-arrow tp-arrow-left" id="tpArrowLeft">‹</button>
<div class="tile-scroll" id="tileItemScroll"></div>
<button class="tp-arrow tp-arrow-right" id="tpArrowRight">›</button>
</div>
<div class="tile-indicator-row" id="tileIndicatorRow"></div>
<button class="tile-more-btn" id="tileMoreBtn"></button>
</div>
</div>
<!-- 에러 로그 (캔버스 위, 에러시만 표시) -->
<div class="debug-wrap" id="debugWrap" style="position:absolute;bottom:60px;left:12px;right:12px;z-index:50;">
<div class="debug-title" style="color:rgba(255,255,255,0.5);">🐞 에러 로그 <span class="debug-clear" onclick="clearDebug()">지우기</span></div>
<div class="debug-panel empty" id="debugPanel">아직 로그 없음</div>
</div>
</div>

<script type="module">
const canvas = document.getElementById('tileCanvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('statusText');
const uploadBtn = document.getElementById('uploadBtn');
const modeBadge = document.getElementById('modeBadge');
const fileInput = document.getElementById('fileInput');
const debugPanel = document.getElementById('debugPanel');
// 타일 규격 선택 버튼 — { w, h }는 실제 cm 비율 (같으면 정사각형, 다르면 직사각형)
let currentTileSize = { w: 80, h: 80 }; // 기본값: 80×80
document.getElementById('tileSizeBtns').addEventListener('click', (e) => {
const btn = e.target.closest('.tsize-btn');
if (!btn) return;
document.querySelectorAll('.tsize-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
const w = parseInt(btn.dataset.w || btn.dataset.cm);
const h = parseInt(btn.dataset.h || btn.dataset.cm);
currentTileSize = { w, h };
if (closed) redraw();
});
let currentTileColor = '#D4C5A9'; // 기본값: 카탈로그의 첫 타일 색
let currentTileTexture = null; // 선택된 타일의 텍스처 이미지 (없으면 단색 사용)

let tileTextureCache = {}; // id -> HTMLImageElement (로딩된 이미지 캐시)

function loadTexture(src, id) {
return new Promise((resolve) => {
if (tileTextureCache[id]) { resolve(tileTextureCache[id]); return; }
const img = new Image();
img.onload = () => { tileTextureCache[id] = img; resolve(img); };
img.onerror = () => resolve(null);
img.src = src;
});
}

const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });

}

}

function withTimeout(promise, ms, label) {
return Promise.race([
promise,
new Promise((_, reject) => setTimeout(() => reject(new Error(label + ' timeout(' + ms + 'ms)')), ms))
 ]);
}

async function initAI() {
try {
logDebug('transformers.js 라이브러리 로딩 시작...');
setStatus('🤖 AI 라이브러리를 불러오는 중...', 'busy');
const mod = await withTimeout(
import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@4/+esm'),
20000, '라이브러리 import'
);
SamModel = mod.SamModel; AutoProcessor = mod.AutoProcessor; RawImage = mod.RawImage;
logDebug('라이브러리 로딩 성공');

setStatus('🤖 AI 모델 다운로드 중... (최초 1회, 와이파이 권장)', 'busy');
const MODEL_ID = 'Xenova/slimsam-77-uniform';
samModel = await withTimeout(SamModel.from_pretrained(MODEL_ID), 60000, '모델(SamModel) 다운로드');
logDebug('SamModel 로딩 성공');
samProcessor = await withTimeout(AutoProcessor.from_pretrained(MODEL_ID), 60000, '프로세서 다운로드');
logDebug('AutoProcessor 로딩 성공');

aiReady = true;
modeBadge.textContent = 'AI 준비됨';
modeBadge.style.background = '#312047';
modeBadge.style.color = '#c084fc';
setStatus('✅ AI 준비 완료! 사진을 올려주세요.', 'ai');
const hint = document.getElementById('uploadHint');
if (hint) hint.textContent = 'AI 준비 완료 — 사진을 올려주세요';
} catch (err) {
logDebug('❌ AI 로딩 실패: ' + (err?.message || err));
aiReady = false;
modeBadge.textContent = '수동 전용';
modeBadge.style.background = '#3f2d12';
modeBadge.style.color = '#fbbf24';
setStatus('⚠️ AI 로드 실패. 수동으로 점을 탭해서 바닥을 선택하세요.', 'warn');
const hint2 = document.getElementById('uploadHint');
if (hint2) hint2.textContent = '수동 모드로 사용 가능해요';
} finally {
uploadBtn.disabled = false;
}
}

async function prepareImageEmbeddings() {
setStatus('🔍 AI가 이미지를 분석 중... (몇 초 걸려요, 끝나면 AI 버튼이 활성화됩니다)', 'busy');
try {
logDebug('RawImage.fromCanvas 호출...');
const rawImage = await RawImage.fromCanvas(canvas);
logDebug('RawImage 생성 완료: ' + rawImage.width + 'x' + rawImage.height);

const processed = await samProcessor(rawImage);
logDebug('전처리 완료. original_sizes=' + JSON.stringify(processed.original_sizes));

const { image_embeddings, image_positional_embeddings } = await samModel.get_image_embeddings({
pixel_values: processed.pixel_values
});
logDebug('임베딩 계산 완료');

cachedEmbeddings = {
image_embeddings,
image_positional_embeddings,
original_sizes: processed.original_sizes,
reshaped_input_sizes: processed.reshaped_input_sizes
};
setStatus('✅ AI 준비 완료! 👆 바닥을 한 번 탭하면 AI가 영역을 찾아드려요.', 'ai');
} catch (err) {
logDebug('❌ 이미지 분석 실패: ' + (err?.message || err));
setStatus('⚠️ AI 분석에 실패했어요. 수동 모드로 점을 찍어주세요.', 'warn');
}
}

// ── 좌표 변환 ──
function clientToCanvasPos(clientX, clientY) {
const r = canvas.getBoundingClientRect();
return {
x: (clientX - r.left) * (canvas.width / r.width),
y: (clientY - r.top) * (canvas.height / r.height)
};
}

// ── AI 탭 처리 ──
async function runSamAt(canvasX, canvasY) {
if (!cachedEmbeddings) {
setStatus('⏳ 아직 이미지 분석 중이에요. 잠시만요.', 'warn');
return;
}
setStatus('🤖 AI가 바닥 영역을 계산 중...', 'busy');
try {
const origW = cachedEmbeddings.original_sizes[0][1];
const origH = cachedEmbeddings.original_sizes[0][0];
const origX = canvasX * (origW / canvas.width);
const origY = canvasY * (origH / canvas.height);
logDebug('SAM 추론 시작 at canvas(' + Math.round(canvasX) + ',' + Math.round(canvasY) + ') -> orig(' + Math.round(origX) + ',' + Math.round(origY) + ')');

const input_points = samProcessor.reshape_input_points(
[[[origX, origY]]],
cachedEmbeddings.original_sizes,
cachedEmbeddings.reshaped_input_sizes
);

const outputs = await samModel({
input_points,
image_embeddings: cachedEmbeddings.image_embeddings,
image_positional_embeddings: cachedEmbeddings.image_positional_embeddings
});
logDebug('SAM 추론 완료');

const masks = await samProcessor.post_process_masks(
outputs.pred_masks,
cachedEmbeddings.original_sizes,
cachedEmbeddings.reshaped_input_sizes
);

const scores = outputs.iou_scores.data;
let bestIdx = 0, bestScore = -Infinity;
for (let i = 0; i < scores.length; i++) {
if (scores[i] > bestScore) { bestScore = scores[i]; bestIdx = i; }
}
logDebug('마스크 후보 점수: ' + Array.from(scores).map(s => s.toFixed(3)).join(', ') + ' -> 선택: ' + bestIdx);

const maskTensor = masks[0];
const sliceSize = origH * origW;
const maskData = maskTensor.data.subarray(bestIdx * sliceSize, (bestIdx + 1) * sliceSize);

const contour = traceContour(maskData, origW, origH);
logDebug('외곽선 추적 결과: ' + contour.length + '개 점');
if (contour.length < 3) {
setStatus('⚠️ 그 지점에서 바닥 영역을 찾지 못했어요. 바닥 위 다른 곳을 탭해보세요.', 'warn');
return;
}
const simplified = simplifyClosedPolygon(contour);
logDebug('단순화 후: ' + simplified.length + '개 점');

// ── 핵심 수정: 캔버스 좌표로 변환 전에 픽셀 단위 dedup 수행 ──

// ── 다각형 편집 헬퍼 ──
function pointToSegmentDistance(p, a, b) {
const dx = b.x - a.x, dy = b.y - a.y;
const len2 = dx * dx + dy * dy;
let t = len2 === 0 ? 0 : ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
t = Math.max(0, Math.min(1, t));
const projX = a.x + t * dx, projY = a.y + t * dy;
return Math.hypot(p.x - projX, p.y - projY);
}
